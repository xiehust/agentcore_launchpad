# AgentCore Launchpad configuration — example.
# The real file (config/launchpad.yaml) is generated by scripts/bootstrap.py
# and is gitignored because it contains account ids and demo credentials.

account_id: "123456789012"
region: us-west-2

resources:
  artifacts_bucket: launchpad-artifacts-123456789012-us-west-2
  ecr_repo: launchpad-agents
  ecr_repo_uri: 123456789012.dkr.ecr.us-west-2.amazonaws.com/launchpad-agents
  codebuild_project: launchpad-agent-builder
  user_pool_id: us-west-2_XXXXXXXXX
  user_pool_client_id: xxxxxxxxxxxxxxxxxxxxxxxxxx
  execution_role_arn: arn:aws:iam::123456789012:role/launchpad-agent-execution-role
  registry_id: launchpad-registry-XXXXXXXXXX
  registry_arn: arn:aws:bedrock-agentcore:us-west-2:123456789012:registry/launchpad-registry-XXXXXXXXXX
  memory_id: launchpad_memory-XXXXXXXXXX
  memory_arn: arn:aws:bedrock-agentcore:us-west-2:123456789012:memory/launchpad_memory-XXXXXXXXXX

demo_users:
  passwords:
    river: "<set by bootstrap — platform-admin>"
    demo: "<set by bootstrap — hr-analyst>"

# Observability cost estimates (advisory, shown as "≈ / EST" in the console):
# USD per 1M tokens, keys substring-matched against gen_ai.request.model ids.
# Models without an entry show token counts with a "—" cost.
# Kept fresh from litellm's public price file: a daily daemon + the dashboard's
# "⟳ UPDATE PRICES" button add exact entries (incl. cache read/write rates) for
# models seen in telemetry and refresh these fallback keys in place.
model_prices:
  sonnet-4-6: {input: 3.0, output: 15.0}
  opus-4-8: {input: 5.0, output: 25.0}
  sonnet-4-5: {input: 3.0, output: 15.0}
  nemotron-nano: {input: 0.2, output: 0.6}
# model_prices_source_url: https://raw.githubusercontent.com/BerriAI/litellm/main/model_prices_and_context_window.json
# model_prices_refresh_hours: 24   # 0 disables the periodic refresher
