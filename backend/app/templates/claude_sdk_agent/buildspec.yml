version: 0.2

# Env expected via start_build environmentVariablesOverride:
#   AWS_REGION, ECR_REGISTRY, ECR_REPO, IMAGE_TAG
phases:
  pre_build:
    commands:
      - echo "logging in to $ECR_REGISTRY"
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
  build:
    commands:
      - echo "building $ECR_REPO:$IMAGE_TAG (linux/arm64)"
      - docker build --platform linux/arm64 -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG .
  post_build:
    commands:
      - docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
      - echo "pushed $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG"
